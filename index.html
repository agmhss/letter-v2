<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Smart Letter Drafter - AGMHSS</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- OCR + PDF -->
  <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- IMPORTANT (GitHub Pages): Self-host Tamil font for reliable PDF capture
       Put these files in your repo:
       /fonts/NotoSansTamil-Regular.woff2
       /fonts/NotoSansTamil-Bold.woff2
  -->
  <link rel="preload" href="./fonts/NotoSansTamil-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./fonts/NotoSansTamil-Bold.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face{
      font-family:"NotoSansTamilLocal";
      src:url("./fonts/NotoSansTamil-Regular.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:"NotoSansTamilLocal";
      src:url("./fonts/NotoSansTamil-Bold.woff2") format("woff2");
      font-weight:700;
      font-style:normal;
      font-display:swap;
    }

    .paper-font {
      font-family: "NotoSansTamilLocal", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #letter-preview{
      width:210mm;
      min-height:297mm;
      position:relative;
      background:#fff;
      margin:20px auto;
      overflow:visible;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      page-break-inside:avoid;
      page-break-after:avoid;
    }

    #bgTemplate{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:fill;
      z-index:0;
    }

    #contentArea{
      position:relative;
      z-index:10;
      min-height:297mm;
      display:flex;
      flex-direction:column;
      padding:45mm 20mm 20mm 25mm;
      font-size:12pt;
    }

    #bodyText{
      outline:none;
      white-space:pre-wrap;
    }

    @media print{
      .no-print{display:none;}
      body{background:#fff;padding:0;margin:0;}
      #letter-preview{margin:0;box-shadow:none;overflow:visible !important;}
    }
  </style>
</head>

<body class="bg-slate-300 min-h-screen pb-10 font-sans">
  <div class="no-print bg-slate-900 text-white p-4 mb-6 shadow-md flex justify-between items-center px-6 lg:px-10">
    <h1 class="text-xl font-bold tracking-tight">AI Letter Pad - AGMHSS</h1>
    <div class="text-xs uppercase tracking-widest text-slate-400 font-semibold">IT Department</div>
  </div>

  <div class="max-w-[1400px] mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <!-- Tools -->
    <div class="lg:col-span-4 space-y-4 no-print">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="font-bold text-gray-800 mb-4 border-b pb-2">Tools</h2>

        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">1. Letterhead Template</label>
            <input
              type="file"
              id="templateInput"
              accept="image/*"
              class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200"
            />
            <p class="text-[11px] text-slate-500 mt-2">
              Tip: use a high-res template image for best PDF.
            </p>
          </div>

          <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
            <label class="block text-xs font-bold text-indigo-900 uppercase mb-1">2. Received Letter Scan (OCR)</label>
            <input type="file" id="receivedLetterInput" accept="image/*" class="w-full text-xs mb-2" />
            <button
              onclick="processOCR()"
              id="ocrBtn"
              class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 disabled:opacity-60"
            >
              Scan & Extract
            </button>
            <div id="ocrStatus" class="text-[11px] text-indigo-900 mt-2"></div>
          </div>

          <div class="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
            <p class="text-[10px] font-black text-slate-400 uppercase">Font & Margins</p>

            <div>
              <div class="flex justify-between text-xs mb-1 font-bold text-indigo-700">
                <span>Size</span><span id="fontVal">12pt</span>
              </div>
              <input
                type="range"
                id="fontSize"
                min="10"
                max="20"
                value="12"
                class="w-full h-1.5 bg-indigo-200 rounded-lg cursor-pointer accent-indigo-600"
              />
            </div>

            <div>
              <div class="flex justify-between text-xs mb-1 font-medium text-slate-600">
                <span>Top Margin / மேல் இடைவெளி</span><span id="topVal">45mm</span>
              </div>
              <input
                type="range"
                id="topMargin"
                min="10"
                max="180"
                value="45"
                class="w-full h-1.5 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-slate-800"
              />
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <div class="flex justify-between text-[10px] mb-1 font-bold">
                  <span>இடது</span><span id="leftVal">25mm</span>
                </div>
                <input
                  type="range"
                  id="leftMargin"
                  min="10"
                  max="80"
                  value="25"
                  class="w-full h-1 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-slate-800"
                />
              </div>
              <div>
                <div class="flex justify-between text-[10px] mb-1 font-bold">
                  <span>வலது</span><span id="rightVal">20mm</span>
                </div>
                <input
                  type="range"
                  id="rightMargin"
                  min="10"
                  max="80"
                  value="20"
                  class="w-full h-1 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-slate-800"
                />
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">3. Groq API Key</label>
            <input
              type="password"
              id="groqApiKey"
              class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none"
              placeholder="gsk_..."
              autocomplete="off"
            />
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">4. Letter Context</label>
            <textarea
              id="userPrompt"
              rows="3"
              class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none"
              placeholder="Reply context..."
            ></textarea>
          </div>

          <button
            onclick="generateAIDraft()"
            id="genBtn"
            class="w-full bg-green-700 text-white py-4 rounded-xl font-bold hover:bg-green-800 shadow-lg disabled:opacity-60"
          >
            Generate AI Reply
          </button>

          <div id="genStatus" class="text-[11px] text-slate-600"></div>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="lg:col-span-8 flex flex-col items-center">
      <div class="w-full max-w-[210mm]">
        <div id="letter-preview" class="paper-font text-slate-900">
          <img id="bgTemplate" class="hidden" alt="Letterhead" crossorigin="anonymous" />
          <div id="contentArea">
            <div
              id="bodyText"
              contenteditable="true"
              class="text-justify min-h-[400px] mt-6 flex-grow"
              spellcheck="false"
            ></div>
          </div>
        </div>

        <button
          onclick="downloadPDF()"
          id="pdfBtn"
          class="no-print mt-6 mb-10 w-full bg-rose-600 text-white py-4 rounded-xl font-bold shadow-xl hover:bg-rose-700 disabled:opacity-60"
        >
          Download PDF Letter
        </button>
        <div id="pdfStatus" class="no-print text-[11px] text-slate-700"></div>
      </div>
    </div>
  </div>

<script>
  // UI Controls
  document.getElementById("fontSize").oninput = (e) => {
    const v = e.target.value;
    document.getElementById("contentArea").style.fontSize = v + "pt";
    document.getElementById("fontVal").innerText = v + "pt";
  };

  ["topMargin", "leftMargin", "rightMargin"].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = (e) => {
      const prop = id === "topMargin" ? "paddingTop" : (id === "leftMargin" ? "paddingLeft" : "paddingRight");
      const val = e.target.value + "mm";
      document.getElementById("contentArea").style[prop] = val;
      document.getElementById(id.replace("Margin", "Val")).innerText = val;
    };
  });

  // Template Handling
  document.getElementById("templateInput").onchange = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (ev) => {
      const img = document.getElementById("bgTemplate");
      img.src = ev.target.result;
      img.classList.remove("hidden");
      try { await img.decode(); } catch {}
    };
    reader.readAsDataURL(file);
  };

  // OCR Processing
  async function processOCR() {
    const file = document.getElementById("receivedLetterInput").files[0];
    if (!file) return alert("படம் தேர்ந்தெடுக்கவும்");

    const btn = document.getElementById("ocrBtn");
    const status = document.getElementById("ocrStatus");
    btn.disabled = true;
    btn.innerText = "Scanning...";
    status.textContent = "OCR நடைபெறுகிறது...";

    try {
      const { data: { text } } = await Tesseract.recognize(file, "tam+eng");
      document.getElementById("userPrompt").value = `Reply to this:\n${(text || "").trim()}`;
      status.textContent = "✅ OCR முடிந்தது.";
      btn.innerText = "✅ Done";
    } catch (e) {
      status.textContent = "";
      alert("OCR Error: " + (e && e.message ? e.message : e));
    } finally {
      setTimeout(() => {
        btn.disabled = false;
        btn.innerText = "Scan & Extract";
      }, 1200);
    }
  }

  // AI Generation
  async function generateAIDraft() {
    const key = document.getElementById("groqApiKey").value.trim();
    const prompt = document.getElementById("userPrompt").value.trim();
    if (!key || !prompt) return alert("API Key & Context are required!");

    const body = document.getElementById("bodyText");
    const btn = document.getElementById("genBtn");
    const status = document.getElementById("genStatus");

    body.innerText = "Writing letter...";
    status.textContent = "AI draft உருவாக்கப்படுகிறது...";
    btn.disabled = true;

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            {
              role: "system",
              content: "You are a Tamil Nadu State Government Orders / Letters writer. Write it in 75-200 words to fit on one page. Output plain text (no markdown)."
            },
            { role: "user", content: prompt }
          ],
          temperature: 0.5
        })
      });

      const data = await res.json();
      const txt = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content
        ? data.choices[0].message.content.trim()
        : null;

      if (!txt) throw new Error("Invalid API Response");
      body.innerText = txt;
      status.textContent = "✅ Draft ready.";
    } catch (e) {
      body.innerText = "❌ Error: " + (e && e.message ? e.message : e);
      status.textContent = "";
    } finally {
      btn.disabled = false;
    }
  }

  // Best-quality Tamil PDF on mobile (fonts + image decode + onclone)
  async function downloadPDF() {
    const element = document.getElementById("letter-preview");
    const pdfBtn = document.getElementById("pdfBtn");
    const pdfStatus = document.getElementById("pdfStatus");
    const img = document.getElementById("bgTemplate");

    pdfBtn.disabled = true;
    pdfBtn.innerText = "Generating PDF...";
    pdfStatus.textContent = "PDF தயாராகிறது... (மொபைலில் சிறிது நேரம் ஆகலாம்)";

    try {
      window.scrollTo({ top: 0, left: 0, behavior: "instant" });

      // Wait for fonts
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }

      // Ensure template image is decoded
      if (img && !img.classList.contains("hidden") && img.src) {
        try { await img.decode(); } catch {}
      }

      const scale = Math.min(4, (window.devicePixelRatio || 2) * 2);

      const opt = {
        margin: 0,
        filename: "Letter-ta.pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale,
          dpi: 300,
          backgroundColor: "#ffffff",
          useCORS: true,
          allowTaint: false,
          logging: false,
          scrollX: 0,
          scrollY: 0,
          onclone: (clonedDoc) => {
            const cloned = clonedDoc.getElementById("letter-preview");
            if (cloned) cloned.style.fontFamily = '"NotoSansTamilLocal", system-ui, -apple-system, "Segoe UI", Arial, sans-serif';
          }
        },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
        pagebreak: { mode: ["avoid-all", "css", "legacy"] }
      };

      await html2pdf().set(opt).from(element).save();
      pdfStatus.textContent = "✅ PDF downloaded.";
    } catch (e) {
      pdfStatus.textContent = "";
      alert("PDF Error: " + (e && e.message ? e.message : e));
    } finally {
      pdfBtn.disabled = false;
      pdfBtn.innerText = "Download PDF Letter";
    }
  }
</script>
</body>
</html>
